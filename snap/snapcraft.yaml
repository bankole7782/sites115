name: sites115 # you probably want to 'snapcraft register <name>'
base: core20 # the base snap is the execution environment for this snap
version: '1.3.0' # just for humans, typically '1.2+git' or '1.3.2'
summary: a static sites generator with search functionality # 79 char long summary
description: |
  sites115 is a static sites generator with search functionality.
  Sites developed with this project can be deployed using docker.
  Especially on Google Cloud Run.

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots

architectures:
  - build-on: amd64

parts:
  my-part:
    # See 'snapcraft plugins'
    plugin: go
    source: .


apps:
  sites115:
    command: bin/sites115
    plugs:
      - network
      - network-bind

  sites115d:
    command: bin/sites115d
    plugs:
      - network
      - network-bind
